<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paper Reviewer</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <h1>Paper Reviewer</h1>

    <!-- ── Topic selector ── -->
    <div class="topic-row">
      <span class="topic-label">Paper Topic</span>
      <div class="topic-pills" id="topic-pills">
        <button type="button" class="pill" data-topic="Machine Learning Algorithm"
                onclick="selectTopic(this)">Machine Learning Algorithm</button>
        <button type="button" class="pill" data-topic="NLP"
                onclick="selectTopic(this)">NLP</button>
        <button type="button" class="pill" data-topic="AI for Science"
                onclick="selectTopic(this)">AI for Science</button>
      </div>
      <span id="topic-warning" class="topic-warning" style="display:none;">
        ⚠ Please select a topic before loading.
      </span>
    </div>

    <div class="input-row">
      <input id="md-name" type="text" placeholder="Markdown filename (e.g. paper.md)" />
      <button onclick="loadSections()">Load</button>
    </div>
    <div id="error" class="error"></div>
    <div id="sections"></div>
    <div id="save-row" class="save-row" style="display:none;">
      <button onclick="saveResponses()">Save</button>
      <span id="save-status" class="save-status"></span>
    </div>
  </div>

  <script>
    // header -> textarea element
    const textareas = {};
    let selectedTopic = null;

    function selectTopic(btn) {
      document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
      btn.classList.add("active");
      selectedTopic = btn.dataset.topic;
      document.getElementById("topic-warning").style.display = "none";
    }

    async function loadSections() {
      const mdName = document.getElementById("md-name").value.trim();
      if (!mdName) return;

      if (!selectedTopic) {
        document.getElementById("topic-warning").style.display = "inline";
        return;
      }

      document.getElementById("error").textContent = "";
      document.getElementById("sections").innerHTML = "";
      document.getElementById("save-row").style.display = "none";
      document.getElementById("save-status").textContent = "";
      Object.keys(textareas).forEach(k => delete textareas[k]);

      const res = await fetch("/api/segments", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ md_name: mdName, topic: selectedTopic }),
      });
      const data = await res.json();

      if (data.error) {
        document.getElementById("error").textContent = data.error;
        return;
      }

      // Show active topic badge above sections
      const container = document.getElementById("sections");
      const badge = document.createElement("div");
      badge.className = "topic-badge";
      badge.innerHTML = `Topic: <strong>${data.topic}</strong>`;
      container.appendChild(badge);
      data.sections.forEach(({ header, content }) => {
        const block = document.createElement("div");
        block.className = "section-block";

        const title = header.replace(/^#{1,6}\s*/, "");
        const hint = document.createElement("div");
        hint.className = "section-hint";
        hint.textContent = title;
        block.appendChild(hint);

        const fullText = content ? header + "\n\n" + content : header;
        const textarea = document.createElement("textarea");
        textarea.value = fullText;
        textarea.rows = Math.min(Math.max(fullText.split("\n").length + 2, 4), 30);
        block.appendChild(textarea);
        textareas[header] = textarea;

        container.appendChild(block);
      });

      document.getElementById("save-row").style.display = "flex";
    }

    async function saveResponses() {
      const responses = {};
      for (const [header, ta] of Object.entries(textareas)) {
        responses[header] = ta.value;
      }

      const res = await fetch("/api/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ responses, topic: selectedTopic }),
      });
      const data = await res.json();
      document.getElementById("save-status").textContent = data.message || "Saved.";
    }

    document.getElementById("md-name").addEventListener("keydown", (e) => {
      if (e.key === "Enter") loadSections();
    });
  </script>
</body>
</html>
